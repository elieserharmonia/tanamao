<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entrar – TÁNAMÃO</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body { background: #FFD700; min-height: 100vh; display: flex; flex-direction: column; }
.login-hero {
  padding: 60px 24px 30px;
  text-align: center;
}
.login-logo { font-size: 52px; }
.login-title { font-size: 32px; font-weight: 800; color: #1a1a1a; line-height: 1; }
.login-title span { color: #e65c00; }
.login-sub { font-size: 14px; color: #333; margin-top: 6px; }
.login-card {
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 28px 20px 40px; flex: 1;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
}
.login-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #333; }
.form-group input {
  width: 100%; border: 2px solid #eee; border-radius: 10px;
  padding: 12px 14px; font-family: 'Poppins',sans-serif; font-size: 14px;
  outline: none;
}
.form-group input:focus { border-color: #FFD700; }
.btn-login {
  width: 100%; background: #FFD700; color: #1a1a1a;
  border: none; border-radius: 14px; padding: 15px;
  font-family: 'Poppins',sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 4px 14px rgba(255,215,0,0.4);
}
.divider { text-align: center; color: #ccc; font-size: 12px; margin: 16px 0; position: relative; }
.divider::before, .divider::after {
  content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #eee;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.btn-social {
  width: 100%; background: #f5f5f5; color: #333;
  border: none; border-radius: 14px; padding: 13px;
  font-family: 'Poppins',sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.login-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
.login-footer a { color: #e65c00; font-weight: 700; }
</style>
</head>
<body>
<div class="login-hero">
  <div class="login-logo">🤝</div>
  <div class="login-title">TÁ<span>NA</span>MÃO</div>
  <p class="login-sub">Encontre quem você precisa perto de você</p>
</div>
<div class="login-card">
  <h2>Entrar na sua conta</h2>
  <div class="form-group">
    <label>E-mail ou WhatsApp</label>
    <input type="text" placeholder="seu@email.com ou (14) 99999-0000"/>
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" placeholder="••••••••"/>
  </div>
  <button class="btn-login" onclick="window.location='index.html'">Entrar</button>
  <div class="divider">ou continue com</div>
  <button class="btn-social"><i class="fab fa-google" style="color:#ea4335;font-size:18px;"></i> Google</button>
  <button class="btn-social"><i class="fab fa-facebook" style="color:#1877f2;font-size:18px;"></i> Facebook</button>
  <div class="login-footer">
    Não tem conta? <a href="cadastro.html">Anuncie grátis</a>
  </div>
</div>
</body>
</html>
